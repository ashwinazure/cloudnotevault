<!-- index.html — Cloud Note Vault Frontend -->
<!DOCTYPE html>
<html>
<head>
  <title>Cloud Note Vault</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; }
    .note-card { border: 1px solid #ccc; padding: 15px; margin: 10px; border-radius: 8px; }
    button { background: #0078D4; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    textarea { width: 100%; height: 100px; padding: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>☁ Cloud Note Vault</h1>
  <textarea id='noteText' placeholder='Write your note here...'></textarea>
  <br>
  <input type='file' id='attachment' />
  <button onclick='createNote()'>Save Note</button>
  <div id='notesList'></div>
  <script>
    const API_URL = 'https://apim-cloudnotevault.azure-api.net/notes';
    async function createNote() {
      const text = document.getElementById('noteText').value;
      await fetch(API_URL, { method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, userId: 'user123' }) });
      loadNotes();
    }
    async function loadNotes() {
      const res = await fetch(API_URL);
      const notes = await res.json();
      document.getElementById('notesList').innerHTML =
        notes.map(n => `<div class='note-card'>${n.text}</div>`).join('');
    }
    loadNotes();
  </script>
</body>
</html>
