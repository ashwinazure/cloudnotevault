<!DOCTYPE html>
<html>
<head>
  <title>Cloud Note Vault</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
    h1 { color: #003A70; }
    textarea { width: 100%; height: 100px; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
    button { background: #0078D4; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-top: 10px; }
    .note { border: 1px solid #ddd; padding: 12px; margin: 8px 0; border-radius: 4px; }
    input[type="file"] { margin: 10px 0; display: block; }
  </style>
</head>
<body>

  <h1>Cloud Note Vault</h1>

  <textarea id="noteText" placeholder="Write your note here..."></textarea>
  <input type="file" id="attachment">
  <button onclick="saveNote()">Save Note</button>

  <div id="notesList"></div>

  <script>
    const API_URL = 'https://apim-cloudnotevault.azure-api.net/notes';

    async function saveNote() {
      const text = document.getElementById('noteText').value;

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, userId: 'user1' })
      });

      if (res.ok) {
        alert('Note saved!');
        loadNotes();
      }
    }

    async function loadNotes() {
      const res = await fetch(API_URL);
      const notes = await res.json();

      document.getElementById('notesList').innerHTML =
        notes.map(n => 
          `<div class="note">${n.text}<br><small>${n.createdAt}</small></div>`
        ).join('');
    }

    loadNotes();
  </script>

</body>
</html>
