<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Note Vault</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #357bd8;
    }

    .note {
      background: white;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .note-text {
      max-width: 80%;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .delete-btn:hover {
      background: #c0392b;
    }

    .empty {
      text-align: center;
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>☁️ Cloud Note Vault</header>

<div class="container">

  <textarea id="noteInput" placeholder="Write your note here..."></textarea>
  <button onclick="createNote()">Save Note</button>

  <div id="notesList"></div>

</div>

<script>
  // 🔥 REPLACE THESE WITH YOUR FUNCTION URLs
  const CREATE_URL = "https://func-cloudnotevault.azurewebsites.net/api/CreateNote?code=YOUR_KEY";
  const GET_URL = "https://func-cloudnotevault.azurewebsites.net/api/GetNotes?code=YOUR_KEY";
  const DELETE_URL = "https://func-cloudnotevault.azurewebsites.net/api/DeleteNote?code=YOUR_KEY";

  async function createNote() {
    const text = document.getElementById('noteInput').value;

    if (!text) {
      alert("Enter a note");
      return;
    }

    await fetch(CREATE_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: text,
        userId: "user1"
      })
    });

    document.getElementById('noteInput').value = "";
    loadNotes();
  }

  async function loadNotes() {
    const res = await fetch(GET_URL);
    const notes = await res.json();

    const list = document.getElementById('notesList');
    list.innerHTML = "";

    if (notes.length === 0) {
      list.innerHTML = "<div class='empty'>No notes yet</div>";
      return;
    }

    notes.reverse().forEach(note => {
      const div = document.createElement('div');
      div.className = "note";

      div.innerHTML = `
        <div class="note-text">${note.text}</div>
        <button class="delete-btn" onclick="deleteNote('${note.id}')">Delete</button>
      `;

      list.appendChild(div);
    });
  }

  async function deleteNote(id) {
    await fetch(`${DELETE_URL}&id=${id}`, {
      method: "DELETE"
    });

    loadNotes();
  }

  loadNotes();
</script>

</body>
</html>
