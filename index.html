<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Note Vault</title>
<style>

/* ── Reset & base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ── CSS Variables — Light mode ────────────────────────────── */
:root {
  --bg-page:        #F0F2F5;
  --bg-surface:     #FFFFFF;
  --bg-sidebar:     #1E2A3A;
  --bg-sidebar-hover: rgba(255,255,255,0.08);
  --bg-input:       #F7F8FA;
  --bg-card:        #FFFFFF;
  --bg-card-hover:  #FAFBFF;
  --bg-tag:         #EBF3FF;
  --accent:         #2563EB;
  --accent-dark:    #1D4ED8;
  --accent-light:   #EBF3FF;
  --accent-glow:    rgba(37,99,235,0.12);
  --text-primary:   #111827;
  --text-secondary: #6B7280;
  --text-muted:     #9CA3AF;
  --text-sidebar:   rgba(255,255,255,0.85);
  --text-sidebar-muted: rgba(255,255,255,0.45);
  --border:         rgba(0,0,0,0.08);
  --border-card:    rgba(0,0,0,0.06);
  --border-input:   rgba(0,0,0,0.1);
  --red:            #EF4444;
  --red-bg:         #FEF2F2;
  --green:          #10B981;
  --green-bg:       #ECFDF5;
  --amber:          #F59E0B;
  --amber-bg:       #FFFBEB;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --radius-xl:   20px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-btn:  0 1px 2px rgba(37,99,235,0.2);
  --sidebar-w: 220px;
  --header-h:   56px;
}

/* ── Dark mode ─────────────────────────────────────────────── */
.dark-mode {
  --bg-page:        #0F1117;
  --bg-surface:     #1A1D27;
  --bg-sidebar:     #111318;
  --bg-sidebar-hover: rgba(255,255,255,0.06);
  --bg-input:       #1F2335;
  --bg-card:        #1A1D27;
  --bg-card-hover:  #1F2335;
  --bg-tag:         #1E2A45;
  --accent:         #3B82F6;
  --accent-dark:    #2563EB;
  --accent-light:   #1E2A45;
  --accent-glow:    rgba(59,130,246,0.15);
  --text-primary:   #F1F5F9;
  --text-secondary: #94A3B8;
  --text-muted:     #475569;
  --border:         rgba(255,255,255,0.07);
  --border-card:    rgba(255,255,255,0.06);
  --border-input:   rgba(255,255,255,0.1);
  --red-bg:         #2D1515;
  --green-bg:       #0F2A1E;
  --amber-bg:       #2A1F0A;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-card-hover: 0 4px 16px rgba(0,0,0,0.4);
}

/* ── App shell ─────────────────────────────────────────────── */
.app-shell { display: flex; min-height: 100vh; }

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.brand-logo { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-icon svg { width: 16px; height: 16px; fill: #fff; }
.brand-name { font-size: 14px; font-weight: 600; color: #fff; letter-spacing: -0.01em; }
.brand-tagline { font-size: 11px; color: var(--text-sidebar-muted); margin-top: 2px; }
.sidebar-nav { padding: 12px 10px; flex: 1; }
.nav-section-label {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-sidebar-muted);
  padding: 8px 8px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background 0.15s;
  color: var(--text-sidebar); font-size: 13px; user-select: none;
}
.nav-item:hover  { background: var(--bg-sidebar-hover); }
.nav-item.active { background: rgba(37,99,235,0.25); color: #93C5FD; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.75; }
.nav-badge {
  margin-left: auto; background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 600; padding: 1px 6px;
  border-radius: 99px; min-width: 18px; text-align: center;
}
.sidebar-footer {
  padding: 14px 14px 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 12px; font-weight: 500; color: var(--text-sidebar); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 10px; color: var(--text-sidebar-muted); }

/* ── Main content ──────────────────────────────────────────── */
.main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; min-height: 100vh; }

/* ── Top header ────────────────────────────────────────────── */
.topbar {
  height: var(--header-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1; }

/* ── Search ────────────────────────────────────────────────── */
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 1.75;
  pointer-events: none;
}
.search-input {
  height: 34px; width: 220px;
  background: var(--bg-input);
  border: 1px solid var(--border-input);
  border-radius: var(--radius-xl);
  padding: 0 12px 0 32px;
  font-size: 13px; color: var(--text-primary); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, width 0.3s;
  font-family: inherit;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); width: 260px; }
.search-input::placeholder { color: var(--text-muted); }

/* ── Topbar buttons ────────────────────────────────────────── */
.topbar-btn {
  height: 34px; padding: 0 12px;
  border: 1px solid var(--border-input); border-radius: var(--radius-md);
  background: var(--bg-surface); color: var(--text-secondary);
  font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.15s, color 0.15s; font-family: inherit;
}
.topbar-btn:hover { background: var(--bg-input); color: var(--text-primary); }
.topbar-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; }
.topbar-btn.dark-toggle { border-radius: 50%; width: 34px; padding: 0; justify-content: center; }
.menu-btn { display: none; }

/* ── Page content ──────────────────────────────────────────── */
.page-content { padding: 24px 28px; flex: 1; max-width: 960px; }

/* ── Compose card ──────────────────────────────────────────── */
.compose-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 18px 20px; margin-bottom: 28px;
  transition: box-shadow 0.2s;
}
.compose-card:focus-within {
  box-shadow: var(--shadow-card-hover), 0 0 0 3px var(--accent-glow);
  border-color: rgba(37,99,235,0.2);
}
.compose-title-input {
  width: 100%; border: none; background: transparent;
  font-size: 15px; font-weight: 600; color: var(--text-primary); outline: none;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
  margin-bottom: 12px; font-family: inherit; transition: border-color 0.2s;
}
.compose-title-input::placeholder { color: var(--text-muted); font-weight: 400; }
.compose-title-input:focus { border-color: rgba(37,99,235,0.3); }
.compose-textarea {
  width: 100%; min-height: 90px; border: none; background: transparent;
  font-size: 14px; line-height: 1.65; color: var(--text-primary);
  outline: none; resize: vertical; font-family: inherit;
}
.compose-textarea::placeholder { color: var(--text-muted); }
.compose-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); gap: 10px;
}
.compose-meta { display: flex; align-items: center; gap: 8px; }
.char-count { font-size: 12px; color: var(--text-muted); }
.tag-input {
  height: 28px; padding: 0 10px;
  background: var(--bg-input); border: 1px solid var(--border-input);
  border-radius: 99px; font-size: 12px; color: var(--text-primary);
  outline: none; width: 90px; font-family: inherit;
  transition: border-color 0.2s, width 0.3s;
}
.tag-input:focus { border-color: var(--accent); width: 120px; }
.tag-input::placeholder { color: var(--text-muted); }

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 16px; border-radius: var(--radius-md);
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: none; outline: none;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  font-family: inherit; user-select: none;
}
.btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.btn-primary { background: var(--accent); color: #fff; box-shadow: var(--shadow-btn); }
.btn-primary:hover  { background: var(--accent-dark); }
.btn-primary:active { transform: scale(0.97); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-input); }
.btn-ghost:hover  { background: var(--bg-input); color: var(--text-primary); }
.btn-ghost:active { transform: scale(0.97); }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,0.15); }
.btn-danger:hover  { background: rgba(239,68,68,0.12); }
.btn-danger:active { transform: scale(0.97); }
.btn-primary.loading { pointer-events: none; opacity: 0.8; }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
.btn-primary.loading .spinner { display: block; }
.btn-primary.loading .btn-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Stats row ─────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg-surface); border: 1px solid var(--border-card);
  border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-card);
}
.stat-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-value.accent { color: var(--accent); }
.stat-value.green  { color: var(--green); }

/* ── Section header ────────────────────────────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
.sort-select {
  height: 30px; padding: 0 10px;
  border: 1px solid var(--border-input); border-radius: var(--radius-sm);
  background: var(--bg-surface); color: var(--text-secondary);
  font-size: 12px; cursor: pointer; outline: none; font-family: inherit;
}

/* ── Notes grid ────────────────────────────────────────────── */
.notes-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 14px; }

/* ── Note card ─────────────────────────────────────────────── */
.note-card {
  background: var(--bg-card); border: 1px solid var(--border-card);
  border-radius: var(--radius-lg); padding: 16px 18px;
  box-shadow: var(--shadow-card);
  display: flex; flex-direction: column; gap: 10px;
  animation: fadeSlideIn 0.25s ease both;
  transition: box-shadow 0.2s, transform 0.2s, background 0.15s;
  cursor: default; position: relative; overflow: hidden;
}
.note-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-accent, var(--accent));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.note-card:hover { box-shadow: var(--shadow-card-hover); transform: translateY(-2px); background: var(--bg-card-hover); }
@keyframes fadeSlideIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.note-card.color-blue   { --card-accent: #3B82F6; }
.note-card.color-green  { --card-accent: #10B981; }
.note-card.color-amber  { --card-accent: #F59E0B; }
.note-card.color-purple { --card-accent: #8B5CF6; }
.note-card.color-red    { --card-accent: #EF4444; }
.note-card.color-teal   { --card-accent: #06B6D4; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.35; word-break: break-word; }
.card-menu-btn {
  background: none; border: none; cursor: pointer;
  padding: 2px 4px; border-radius: var(--radius-sm); color: var(--text-muted);
  display: flex; align-items: center; opacity: 0;
  transition: opacity 0.15s, background 0.15s; flex-shrink: 0;
}
.note-card:hover .card-menu-btn { opacity: 1; }
.card-menu-btn:hover { background: var(--bg-input); color: var(--text-secondary); }
.card-menu-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.75; }
.card-body {
  font-size: 13px; line-height: 1.65; color: var(--text-secondary);
  word-break: break-word; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid var(--border-card); }
.card-tag { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 99px; background: var(--bg-tag); color: var(--accent); }
.card-date { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.card-date svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 1.75; }

/* ── Empty state ───────────────────────────────────────────── */
.empty-state { grid-column: 1/-1; text-align: center; padding: 56px 24px; animation: fadeSlideIn 0.3s ease both; }
.empty-icon {
  width: 64px; height: 64px; background: var(--accent-light); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
}
.empty-icon svg { width: 28px; height: 28px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.empty-sub { font-size: 13px; color: var(--text-muted); max-width: 280px; margin: 0 auto 20px; line-height: 1.6; }

/* ── Toast ─────────────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  padding: 11px 16px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 8px; max-width: 320px;
  pointer-events: auto; animation: toastIn 0.3s ease both; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; }
.toast-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.toast-error   { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(239,68,68,0.2); }
.toast-info    { background: var(--accent-light); color: var(--accent); border: 1px solid rgba(37,99,235,0.15); }
.toast.removing { animation: toastOut 0.25s ease both; }
@keyframes toastIn  { from { opacity:0; transform:translateY(12px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes toastOut { to   { opacity:0; transform:translateY(8px) scale(0.96); } }

/* ── Confirm dialog ────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.15s ease both;
}
.overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.dialog {
  background: var(--bg-surface); border-radius: var(--radius-xl);
  padding: 28px 28px 24px; max-width: 360px; width: calc(100% - 40px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: dialogIn 0.2s ease both;
}
@keyframes dialogIn { from { opacity:0; transform:scale(0.94) translateY(-8px); } to { opacity:1; transform:scale(1) translateY(0); } }
.dialog-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--red-bg); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
.dialog-icon svg { width: 20px; height: 20px; stroke: var(--red); fill: none; stroke-width: 2; }
.dialog-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.dialog-sub   { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 20px; }
.dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── Skeleton ──────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--bg-input) 25%, var(--border) 50%, var(--bg-input) 75%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius-sm);
}
.skeleton-card { background: var(--bg-card); border: 1px solid var(--border-card); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow-card); }
@keyframes shimmer { to { background-position: -200% center; } }

/* ── Mobile sidebar overlay ────────────────────────────────── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { width: 220px; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.visible { display: block; }
  .menu-btn { display: flex; }
  .main { margin-left: 0; }
  .page-content { padding: 16px; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  .stats-row .stat-card:last-child { display: none; }
  .notes-grid { grid-template-columns: 1fr; }
  .search-input { width: 140px; }
  .search-input:focus { width: 170px; }
  .compose-footer { flex-direction: column; align-items: flex-start; }
  .btn-primary { width: 100%; justify-content: center; }
}
@media (max-width: 480px) {
  .topbar-title { font-size: 14px; }
  .stats-row { grid-template-columns: 1fr; }
}

</style>
</head>
<body>

<!-- Delete Confirm Dialog -->
<div class="overlay hidden" id="confirmOverlay">
  <div class="dialog">
    <div class="dialog-icon">
      <svg viewBox="0 0 20 20"><polyline points="3 6 5 6 17 6"/><path d="M8 6V4h4v2M19 6l-1 13a2 2 0 01-2 2H4a2 2 0 01-2-2L1 6"/><line x1="10" y1="11" x2="10" y2="15"/></svg>
    </div>
    <h3 class="dialog-title">Delete this note?</h3>
    <p class="dialog-sub">This action cannot be undone. The note will be permanently removed from your vault.</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete note</button>
    </div>
  </div>
</div>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- App Shell -->
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg viewBox="0 0 16 16"><path d="M8 1l1.5 3 3.5.5-2.5 2.5.6 3.5L8 9l-3.1 1.5.6-3.5L3 4.5 6.5 4z"/></svg>
        </div>
        <div>
          <div class="brand-name">Cloud Note Vault</div>
          <div class="brand-tagline">Microsoft Azure</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Workspace</div>
      <div class="nav-item active" onclick="filterNotes('all', this)">
        <svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        All Notes
        <span class="nav-badge" id="sidebarCount">0</span>
      </div>
      <div class="nav-item" onclick="filterNotes('recent', this)">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><polyline points="8 5 8 8 10 10"/></svg>
        Recent
      </div>
      <div class="nav-section-label" style="margin-top:12px">Tags</div>
      <div class="nav-item" onclick="filterByTag('work', this)">
        <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 3V2a1 1 0 012 0v1M9 3V2a1 1 0 012 0v1"/></svg>
        Work
      </div>
      <div class="nav-item" onclick="filterByTag('personal', this)">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="5" r="2.5"/><path d="M3 14c0-3 2-5 5-5s5 2 5 5"/></svg>
        Personal
      </div>
      <div class="nav-item" onclick="filterByTag('ideas', this)">
        <svg viewBox="0 0 16 16"><path d="M8 1a4.5 4.5 0 010 9M8 10v2M6 14h4"/></svg>
        Ideas
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="userAvatar">S</div>
        <div class="user-info">
          <div class="user-name">Student</div>
          <div class="user-role">Azure Free Tier</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <header class="topbar">
      <button class="topbar-btn menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 14 14"><line x1="1" y1="3" x2="13" y2="3"/><line x1="1" y1="7" x2="13" y2="7"/><line x1="1" y1="11" x2="13" y2="11"/></svg>
      </button>
      <span class="topbar-title" id="pageTitle">All Notes</span>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 14 14"><circle cx="6" cy="6" r="4.5"/><line x1="9.5" y1="9.5" x2="13" y2="13"/></svg>
        <input class="search-input" type="search" id="searchInput" placeholder="Search notes…" oninput="handleSearch()">
      </div>
      <button class="topbar-btn dark-toggle" onclick="toggleDark()" title="Toggle dark mode">
        <svg id="darkIcon" viewBox="0 0 14 14"><path d="M7 1a6 6 0 100 12A6 6 0 007 1z"/><circle cx="7" cy="7" r="2.5"/></svg>
      </button>
    </header>

    <div class="page-content">

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Total Notes</div>
          <div class="stat-value accent" id="statTotal">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">This Week</div>
          <div class="stat-value green" id="statWeek">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Storage</div>
          <div class="stat-value" id="statStorage">0 KB</div>
        </div>
      </div>

      <!-- Compose -->
      <div class="compose-card">
        <input class="compose-title-input" id="noteTitle" type="text" placeholder="Note title (optional)" maxlength="80">
        <textarea class="compose-textarea" id="noteText" placeholder="Start writing your note… Ctrl+Enter to save." maxlength="2000" oninput="updateCharCount()" rows="4"></textarea>
        <div class="compose-footer">
          <div class="compose-meta">
            <span class="char-count" id="charCount">0 / 2000</span>
            <input class="tag-input" id="noteTag" type="text" placeholder="#tag" maxlength="20">
          </div>
          <button class="btn btn-primary" id="saveBtn" onclick="saveNote()">
            <div class="spinner"></div>
            <span class="btn-text">
              <svg viewBox="0 0 14 14"><path d="M2 7l4 4 6-7"/></svg>
              Save Note
            </span>
          </button>
        </div>
      </div>

      <!-- Notes -->
      <div class="section-header">
        <span class="section-title" id="sectionLabel">Notes</span>
        <select class="sort-select" id="sortSelect" onchange="sortNotes()">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="az">A → Z</option>
        </select>
      </div>

      <div class="notes-grid" id="notesGrid">
        <div class="skeleton-card"><div class="skeleton" style="height:14px;width:60%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:90%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:75%"></div></div>
        <div class="skeleton-card"><div class="skeleton" style="height:14px;width:45%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:85%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:70%"></div></div>
        <div class="skeleton-card"><div class="skeleton" style="height:14px;width:70%;margin-bottom:10px"></div><div class="skeleton" style="height:11px;width:80%;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:55%"></div></div>
      </div>

    </div>
  </main>
</div>

<script>
// ── CONFIG — replace with your APIM gateway URL ──────────────
const API_URL = 'https://apim-cloudnotevault.azure-api.net/notes';
const CARD_COLORS = ['color-blue','color-green','color-amber','color-purple','color-teal','color-red'];

// ── STATE ────────────────────────────────────────────────────
let allNotes    = [];
let currentFilter = 'all';
let currentTag    = null;
let isDark        = false;
let pendingDeleteId = null;

// ── UTILS ────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 60000)     return 'Just now';
  if (diff < 3600000)   return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000)  return Math.floor(diff/3600000) + 'h ago';
  if (diff < 604800000) return Math.floor(diff/86400000) + 'd ago';
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function isThisWeek(iso) {
  if (!iso) return false;
  return new Date(iso) >= new Date(Date.now() - 7*24*60*60*1000);
}
function fmtStorage(notes) {
  const b = JSON.stringify(notes).length;
  return b < 1024 ? b + ' B' : Math.round(b/1024) + ' KB';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const icons = {
    success:'<svg viewBox="0 0 14 14" style="stroke:currentColor;fill:none;stroke-width:2"><path d="M2 7l3.5 3.5L12 3"/></svg>',
    error:  '<svg viewBox="0 0 14 14" style="stroke:currentColor;fill:none;stroke-width:2"><path d="M2 2l10 10M12 2L2 12"/></svg>',
    info:   '<svg viewBox="0 0 14 14" style="stroke:currentColor;fill:none;stroke-width:2"><circle cx="7" cy="7" r="5.5"/><line x1="7" y1="5" x2="7" y2="7"/><circle cx="7" cy="9.5" r=".5" fill="currentColor"/></svg>'
  };
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.innerHTML = icons[type] + '<span>' + escHtml(msg) + '</span>';
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.classList.add('removing'); setTimeout(() => el.remove(), 280); }, 3200);
}

// ── STATS ────────────────────────────────────────────────────
function updateStats(notes) {
  document.getElementById('statTotal').textContent    = notes.length;
  document.getElementById('sidebarCount').textContent = notes.length;
  document.getElementById('statWeek').textContent     = notes.filter(n => isThisWeek(n.createdAt)).length;
  document.getElementById('statStorage').textContent  = fmtStorage(notes);
}

// ── RENDER ───────────────────────────────────────────────────
function renderNotes(notes) {
  const grid  = document.getElementById('notesGrid');
  const query = document.getElementById('searchInput').value.trim();
  if (notes.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg viewBox="0 0 28 28"><path d="M4 6h20v18H4z"/><path d="M9 11h10M9 15h6"/></svg></div>
        <h3 class="empty-title">${query ? 'No results found' : 'Your vault is empty'}</h3>
        <p class="empty-sub">${query ? 'Try different keywords.' : 'Write your first note above.'}</p>
        ${!query ? '<button class="btn btn-primary" onclick="document.getElementById(\'noteText\').focus()"><svg viewBox="0 0 14 14" style="stroke:#fff;fill:none;stroke-width:2"><path d="M7 2v10M2 7h10"/></svg> Write first note</button>' : ''}
      </div>`;
    return;
  }
  grid.innerHTML = notes.map((note, i) => `
    <article class="note-card ${CARD_COLORS[i % CARD_COLORS.length]}">
      <div class="card-header">
        ${note.title ? `<h3 class="card-title">${escHtml(note.title)}</h3>` : ''}
        <button class="card-menu-btn" onclick="confirmDelete('${escHtml(note.id)}')" title="Delete">
          <svg viewBox="0 0 15 15"><polyline points="3 4 4 4 12 4"/><path d="M5.5 4V3a1 1 0 011-1h2a1 1 0 011 1v1M10 4l-.7 8a1 1 0 01-1 1h-1.6a1 1 0 01-1-1L5 4"/></svg>
        </button>
      </div>
      <p class="card-body">${escHtml(note.text || '')}</p>
      <div class="card-footer">
        ${note.tag ? `<span class="card-tag">#${escHtml(note.tag)}</span>` : '<span></span>'}
        <span class="card-date">
          <svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5"/><polyline points="6 3.5 6 6 7.5 7.5"/></svg>
          ${fmtDate(note.createdAt)}
        </span>
      </div>
    </article>`).join('');
}

// ── FILTER / SEARCH ──────────────────────────────────────────
function applyFilter() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let result  = [...allNotes];
  if (currentFilter === 'recent') result = result.filter(n => isThisWeek(n.createdAt));
  if (currentTag) result = result.filter(n => n.tag && n.tag.toLowerCase() === currentTag);
  if (query) result = result.filter(n =>
    (n.text||'').toLowerCase().includes(query) ||
    (n.title||'').toLowerCase().includes(query) ||
    (n.tag||'').toLowerCase().includes(query));
  renderNotes(result);
}
function handleSearch() { applyFilter(); }

function filterNotes(type, el) {
  currentFilter = type; currentTag = null;
  document.getElementById('pageTitle').textContent    = type === 'recent' ? 'Recent Notes' : 'All Notes';
  document.getElementById('sectionLabel').textContent = type === 'recent' ? 'Recent' : 'Notes';
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  applyFilter();
}

function filterByTag(tag, el) {
  currentTag = tag; currentFilter = 'all';
  document.getElementById('pageTitle').textContent    = '#' + tag;
  document.getElementById('sectionLabel').textContent = tag;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');
  applyFilter();
}

// ── SORT ─────────────────────────────────────────────────────
function sortNotes() {
  const mode = document.getElementById('sortSelect').value;
  if (mode === 'newest') allNotes.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
  else if (mode === 'oldest') allNotes.sort((a,b) => new Date(a.createdAt||0) - new Date(b.createdAt||0));
  else allNotes.sort((a,b) => (a.title||a.text||'').localeCompare(b.title||b.text||''));
  applyFilter();
}

// ── CHAR COUNT ───────────────────────────────────────────────
function updateCharCount() {
  const len = document.getElementById('noteText').value.length;
  const el  = document.getElementById('charCount');
  el.textContent = len + ' / 2000';
  el.style.color = len > 1800 ? 'var(--red)' : len > 1500 ? 'var(--amber)' : 'var(--text-muted)';
}

// ── DEMO NOTES (shown when API not connected) ─────────────────
function getDemoNotes() {
  const now = new Date();
  return [
    { id:'d1', title:'Azure Project Setup', text:'Resource Group created in Central India. Cosmos DB free tier applied. Next: configure Key Vault secrets.', tag:'work', createdAt: new Date(now-1000*60*30).toISOString() },
    { id:'d2', title:'Redis Caching Notes', text:'GetNotes function checks Redis cache first. Cache TTL is 60 seconds. On cache miss, fetches from Cosmos DB and stores result.', tag:'ideas', createdAt: new Date(now-1000*60*60*3).toISOString() },
    { id:'d3', title:'API Management', text:'APIM takes 30-45 minutes to provision. Use Developer tier. Rate limit: 5 calls per 10 seconds per IP.', tag:'work', createdAt: new Date(now-1000*60*60*26).toISOString() },
    { id:'d4', title:'Project reminder', text:'Submit report by Friday. Include screenshots of all 12 services, Secure Score, and architecture diagram.', tag:'personal', createdAt: new Date(now-1000*60*60*50).toISOString() },
    { id:'d5', title:'Logic Apps workflow', text:'Triggers on HTTP POST from CreateNote function. Sends email via Outlook connector. No extra code needed.', tag:'ideas', createdAt: new Date(now-1000*60*60*74).toISOString() },
  ];
}

// ── API: LOAD ─────────────────────────────────────────────────
async function loadNotes() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allNotes  = await res.json();
    if (!Array.isArray(allNotes)) allNotes = [];
  } catch(e) {
    allNotes = getDemoNotes();
    showToast('Demo mode — connect your API URL to load real notes', 'info');
  }
  updateStats(allNotes);
  applyFilter();
}

// ── API: SAVE ─────────────────────────────────────────────────
async function saveNote() {
  const text  = document.getElementById('noteText').value.trim();
  const title = document.getElementById('noteTitle').value.trim();
  const tag   = document.getElementById('noteTag').value.replace('#','').trim().toLowerCase();
  const btn   = document.getElementById('saveBtn');
  if (!text) { showToast('Please write something before saving.', 'error'); document.getElementById('noteText').focus(); return; }
  btn.classList.add('loading');
  const payload = { text, userId:'user1' };
  if (title) payload.title = title;
  if (tag)   payload.tag   = tag;
  try {
    const res  = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const saved = await res.json();
    allNotes.unshift(saved);
    showToast('Note saved!', 'success');
  } catch(e) {
    const local = { id:'local-'+Date.now(), title:title||undefined, text, tag:tag||undefined, userId:'user1', createdAt:new Date().toISOString() };
    allNotes.unshift(local);
    showToast('Saved locally (API not connected)', 'info');
  }
  document.getElementById('noteText').value  = '';
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteTag').value   = '';
  updateCharCount();
  updateStats(allNotes);
  applyFilter();
  btn.classList.remove('loading');
}

// ── API: DELETE ───────────────────────────────────────────────
function confirmDelete(id) {
  pendingDeleteId = id;
  document.getElementById('confirmOverlay').classList.remove('hidden');
  document.getElementById('confirmDeleteBtn').focus();
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmOverlay').classList.add('hidden');
}
document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
  if (!pendingDeleteId) return;
  const id = pendingDeleteId;
  closeConfirm();
  try {
    const res = await fetch(API_URL + '/' + id, { method:'DELETE' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
  } catch(e) { /* remove locally anyway */ }
  allNotes = allNotes.filter(n => n.id !== id);
  updateStats(allNotes);
  applyFilter();
  showToast('Note deleted.', 'success');
});
document.getElementById('confirmOverlay').addEventListener('click', function(e) { if (e.target===this) closeConfirm(); });
document.addEventListener('keydown', e => { if (e.key==='Escape') closeConfirm(); });

// ── DARK MODE ─────────────────────────────────────────────────
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark-mode', isDark);
  localStorage.setItem('cnv-dark', isDark ? '1' : '0');
  document.getElementById('darkIcon').innerHTML = isDark
    ? '<path d="M7 1a6 6 0 000 12 6 6 0 010-12z"/>'
    : '<path d="M7 1a6 6 0 100 12A6 6 0 007 1z"/><circle cx="7" cy="7" r="2.5"/>';
}

// ── SIDEBAR (mobile) ──────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('visible');
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────
document.getElementById('noteText').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveNote();
});
document.getElementById('noteTitle').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('noteText').focus();
});

// ── INIT ──────────────────────────────────────────────────────
if (localStorage.getItem('cnv-dark') === '1') toggleDark();
loadNotes();
</script>
</body>
</html>
