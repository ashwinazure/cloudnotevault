<script>

/* =========================================================
   🚀 AZURE FUNCTION CONFIG (CLEAN FINAL VERSION)
   ========================================================= */

const BASE_URL = "https://func-cloudnotevault-f2aca2cjfcgjewg6.centralindia-01.azurewebsites.net/api";

const CREATE_URL = `${BASE_URL}/CreateNote?code=JmckeluELiAxUgIryvjISiMmQhFZawL1SuCY6LC-DaEzAzFuz90mLA==`;

const GET_URL = `${BASE_URL}/GetNotes?code=JmckeluELiAxUgIryvjISiMmQhFZawL1SuCY6LC-DaEzAzFuz90mLA==`;

const DELETE_URL = `${BASE_URL}/DeleteNote?code=JmckeluELiAxUgIryvjISiMmQhFZawL1SuCY6LC-DaEzAzFuz90mLA==`;

/* =========================================================
   STATE
   ========================================================= */

let allNotes = [];
let currentFilter = 'all';
let currentTag = null;

/* =========================================================
   LOAD NOTES
   ========================================================= */

async function loadNotes() {
  try {
    const res = await fetch(GET_URL);
    if (!res.ok) throw new Error("Failed to fetch notes");

    const data = await res.json();
    allNotes = Array.isArray(data) ? data : [];

  } catch (err) {
    console.error(err);
    allNotes = [];
    showToast("Unable to load notes", "error");
  }

  renderNotes(allNotes);
  updateStats(allNotes);
}

/* =========================================================
   CREATE NOTE
   ========================================================= */

async function saveNote() {
  const text = document.getElementById("noteText").value.trim();
  const title = document.getElementById("noteTitle").value.trim();
  const tag = document.getElementById("noteTag").value.trim();

  if (!text) {
    showToast("Note cannot be empty", "error");
    return;
  }

  const payload = {
    text,
    title,
    tag,
    userId: "user1"
  };

  try {
    const res = await fetch(CREATE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error("Create failed");

    const newNote = await res.json();
    allNotes.unshift(newNote);

    renderNotes(allNotes);
    updateStats(allNotes);

    document.getElementById("noteText").value = "";
    document.getElementById("noteTitle").value = "";
    document.getElementById("noteTag").value = "";

    showToast("Note created successfully", "success");

  } catch (err) {
    console.error(err);
    showToast("Create failed", "error");
  }
}

/* =========================================================
   DELETE NOTE
   ========================================================= */

async function deleteNote(id) {
  try {
    await fetch(DELETE_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        id,
        userId: "user1"
      })
    });

    allNotes = allNotes.filter(n => n.id !== id);
    renderNotes(allNotes);
    updateStats(allNotes);

    showToast("Note deleted", "success");

  } catch (err) {
    console.error(err);
    showToast("Delete failed", "error");
  }
}

/* =========================================================
   RENDER NOTES
   ========================================================= */

function renderNotes(notes) {
  const grid = document.getElementById("notesGrid");
  if (!grid) return;

  if (!notes.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <h3>No Notes Found</h3>
        <p>Create your first note above</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = notes.map(n => `
    <div class="note-card">
      <h3>${n.title || ""}</h3>
      <p>${n.text || ""}</p>
      <small>#${n.tag || ""}</small>
      <br><br>
      <button onclick="deleteNote('${n.id}')">Delete</button>
    </div>
  `).join("");
}

/* =========================================================
   STATS
   ========================================================= */

function updateStats(notes) {
  const el = document.getElementById("statTotal");
  if (el) el.textContent = notes.length;
}

/* =========================================================
   TOAST
   ========================================================= */

function showToast(msg, type) {
  alert(msg);
}

/* =========================================================
   INIT
   ========================================================= */

let allNotes = [];
loadNotes();

</script>

</body>
</html>
